<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宇宙穿梭 · 重庆大学宿舍</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Microsoft YaHei,sans-serif}
/* 2D启动星空 */
#startCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2}
#startUI{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;z-index:3;transition:opacity 1.5s ease}
#startUI.hide{opacity:0;pointer-events:none}
h1{font-size:60px;margin-bottom:20px;text-shadow:0 0 15px #7cf}
p{font-size:24px;color:#ccc;margin-bottom:40px}
#enterBtn{width:240px;height:66px;border:none;border-radius:99px;font-size:24px;font-weight:bold;cursor:pointer;transition:0.3s;background:#fff;color:#000}
#enterBtn:hover{transform:scale(1.1);box-shadow:0 0 25px #8cf}
/* 3D画布容器 */
#threeBox{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;opacity:0;transition:opacity 1.5s ease}
#threeBox.show{opacity:1;z-index:4}
canvas{width:100vw;height:100vh;display:block}
</style>
<!-- 双CDN备用，防止加载失败 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>window.ThreeBackup = THREE</script>
</head>
<body>
<!-- 首页2D星空 -->
<canvas id="startCanvas"></canvas>
<div id="startUI">
    <h1>🌌 奔赴我的宇宙</h1>
    <p>从深空银河 → 太阳系 → 重庆大学宿舍</p>
    <button id="enterBtn">点击开启旅程</button>
</div>
<!-- 3D动画容器 -->
<div id="threeBox"></div>

<script>
// ---------------------- 1. 首页2D闪烁星空（永久自动动） ----------------------
const startCanvas = document.getElementById('startCanvas');
const ctx = startCanvas.getContext('2d');
function resizeStart(){
    startCanvas.width = window.innerWidth;
    startCanvas.height = window.innerHeight;
}
resizeStart();
window.addEventListener('resize',resizeStart);
// 生成1000颗星星
const starList2d = [];
for(let i=0;i<1000;i++){
    starList2d.push({
        x:Math.random()*startCanvas.width,
        y:Math.random()*startCanvas.height,
        r:Math.random()*1.8+0.1,
        a:Math.random()
    })
}
function render2dStar(){
    ctx.fillStyle='#00000a';
    ctx.fillRect(0,0,startCanvas.width,startCanvas.height);
    starList2d.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${s.a})`;
        ctx.fill();
        s.a += Math.random()*0.02-0.01;
        s.a = Math.max(0.15,Math.min(1,s.a));
    })
    requestAnimationFrame(render2dStar);
}
render2dStar();

// ---------------------- 2. 点击按钮启动3D宇宙动画 ----------------------
const enterBtn = document.getElementById('enterBtn');
const startUI = document.getElementById('startUI');
const threeBox = document.getElementById('threeBox');
enterBtn.onclick = launch3D;

// 全局3D变量
let scene,camera,renderer;
let farStars,galaxy,solarSystem,earth,cquGate,dormDesk;
let stage = 0;
const clock = new THREE.Clock();

// 启动3D场景
function launch3D(){
    // 校验Three.js是否加载成功
    if(!window.THREE && !window.ThreeBackup){
        alert("3D引擎加载失败，请切换网络/无痕窗口重试！");
        return;
    }
    THREE = window.THREE || window.ThreeBackup;

    startUI.classList.add('hide');
    setTimeout(()=>{
        threeBox.classList.add('show');
        initThree();
        animate(); // 强制启动动画循环
    },1200)
}

// 初始化3D场景
function initThree(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color('#010012');
    scene.fog = new THREE.Fog('#010012', 300, 200000);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,200000);
    camera.position.z = 22000;
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    threeBox.appendChild(renderer.domElement);

    // 远景星云
    function createNebula(color,x,y,z,size){
        const geo = new THREE.PlaneGeometry(size,size);
        const mat = new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.07,depthWrite:false});
        const mesh = new THREE.Mesh(geo,mat);
        mesh.position.set(x,y,z);
        scene.add(mesh);
    }
    createNebula('#320060',-1600,200,-4500,3200);
    createNebula('#002a70',2000,-600,-7000,4000);
    createNebula('#621042',-1000,-800,-10000,5000);

    // 漫天深空恒星
    farStars = new THREE.Group();
    const starData = [];
    for(let i=0;i<10000;i++){
        const s = new THREE.Mesh(
            new THREE.SphereGeometry(Math.random()*0.7+0.1,6,6),
            new THREE.MeshBasicMaterial({
                color:new THREE.Color().setHSL(Math.random()*0.25+0.5,0.25,0.75),
                transparent:true,opacity:Math.random()
            })
        );
        s.position.set(
            (Math.random()-0.5)*22000,
            (Math.random()-0.5)*22000,
            (Math.random()-0.5)*22000
        );
        s.userData={op:Math.random(),speed:Math.random()*0.015};
        starData.push(s);
        farStars.add(s);
    }
    scene.add(farStars);
    farStars.userData = starData;

    // 螺旋银河系
    galaxy = new THREE.Group();
    galaxy.position.z = -32000;
    galaxy.rotation.x = 0.2;
    for(let i=0;i<20000;i++){
        const angle = Math.random()*Math.PI*10;
        const r = Math.random()*2800;
        const x = Math.cos(angle)*r;
        const y = (Math.random()-0.5)*240;
        const z = Math.sin(angle)*r;
        const gStar = new THREE.Mesh(
            new THREE.SphereGeometry(Math.random()*0.9+0.1,4,4),
            new THREE.MeshBasicMaterial({
                color:new THREE.Color().setHSL(0.1+Math.random()*0.35,0.7,0.85),
                transparent:true,opacity:Math.random()
            })
        );
        gStar.position.set(x,y,z);
        galaxy.add(gStar);
    }
    scene.add(galaxy);

    // 太阳系：太阳+八大行星
    solarSystem = new THREE.Group();
    solarSystem.position.z = -60000;
    scene.add(solarSystem);
    // 太阳
    const sun = new THREE.Mesh(
        new THREE.SphereGeometry(70,16,16),
        new THREE.MeshBasicMaterial({color:0xffdd70})
    );
    sun.add(new THREE.PointLight(0xfffacc,2.5,1500));
    solarSystem.add(sun);
    // 八大行星参数
    const planetsInfo = [
        {s:2.2,d:130,c:0x8a7252,v:0.0082},
        {s:3.1,d:190,c:0xffd799,v:0.0061},
        {s:4.4,d:270,c:0x6a92d5,v:0.0042},
        {s:2.6,d:350,c:0xdd6a4a,v:0.0031},
        {s:19,d:540,c:0xc78a39,v:0.0011},
        {s:15,d:720,c:0xffdf98,v:0.00082},
        {s:8.3,d:930,c:0x9ed7e7,v:0.00051},
        {s:7.8,d:1130,c:0x496bf2,v:0.00032}
    ];
    const planets = [];
    planetsInfo.forEach(p=>{
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(p.s,12,12),
            new THREE.MeshLambertMaterial({color:p.c})
        );
        mesh.userData={dist:p.d,spd:p.v,ang:0};
        solarSystem.add(mesh);
        planets.push(mesh);
    })
    earth = planets[2]; // 取出地球

    // 重庆大学校门场景
    cquGate = new THREE.Group();
    cquGate.position.z = -80000;
    cquGate.position.y = -60;
    scene.add(cquGate);
    // 校门墙体
    const gateWall = new THREE.Mesh(
        new THREE.BoxGeometry(80,20,6),
        new THREE.MeshLambertMaterial({color:0xcccccc})
    );
    gateWall.position.y = 0;
    cquGate.add(gateWall);
    // 校名文字平面
    const gateSign = new THREE.Mesh(
        new THREE.PlaneGeometry(50,12),
        new THREE.MeshBasicMaterial({color:0x990000})
    );
    gateSign.position.set(0,0,3.2);
    cquGate.add(gateSign);

    // 宿舍桌面+抖音显示器
    dormDesk = new THREE.Group();
    dormDesk.position.z = -100000;
    dormDesk.position.y = -90;
    scene.add(dormDesk);
    // 桌子
    const deskBody = new THREE.Mesh(
        new THREE.BoxGeometry(70,4,35),
        new THREE.MeshLambertMaterial({color:0x583820})
    );
    deskBody.position.y = -18;
    dormDesk.add(deskBody);
    // 显示器外框
    const screenFrame = new THREE.Mesh(
        new THREE.BoxGeometry(26,15,1.5),
        new THREE.MeshLambertMaterial({color:0x111})
    );
    screenFrame.position.set(0,4,-20);
    dormDesk.add(screenFrame);
    // 抖音画面（在线演示图，可替换自己截图）
    const tex = new THREE.TextureLoader().load('https://picsum.photos/id/1039/1080/600');
    const screen = new THREE.Mesh(
        new THREE.PlaneGeometry(24,13),
        new THREE.MeshBasicMaterial({map:tex})
    );
    screen.position.set(0,4,-19.2);
    dormDesk.add(screen);
    // 房间灯光
    dormDesk.add(new THREE.PointLight(0xfff8e0,1.3,220).position.set(0,12,-12));

    // 窗口自适应
    window.addEventListener('resize',()=>{
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth,window.innerHeight);
    })
}

// 主动画循环（修复：永久循环，不会停止）
function animate(){
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    // 星星闪烁
    farStars.userData.forEach(s=>{
        s.material.opacity = s.userData.op + Math.sin(Date.now()*s.userData.speed)*0.36;
    })
    // 银河自转
    galaxy.rotation.z += 0.0003;
    // 行星公转
    solarSystem.children.forEach(obj=>{
        if(obj.userData?.dist){
            obj.userData.ang += obj.userData.spd;
            obj.position.x = Math.cos(obj.userData.ang)*obj.userData.dist;
            obj.position.z = Math.sin(obj.userData.ang)*obj.userData.dist;
        }
    })
    // 地球自转
    earth.rotation.y += 0.0012;

    // 分段自动运镜（加大移动速度，防止卡住不动）
    const speed = {s0:3.5,s1:1.6,s2:0.6,s3:0.25,s4:0.09};
    switch(stage){
        case 0:
            camera.position.z -= speed.s0;
            if(camera.position.z < -25000) stage=1;
            break;
        case 1:
            camera.position.z -= speed.s1;
            if(camera.position.z < -54000) stage=2;
            camera.lookAt(0,0,-45000);
            break;
        case 2:
            camera.position.z -= speed.s2;
            if(camera.position.z < -69000) stage=3;
            camera.lookAt(earth.position.x,earth.position.y,earth.position.z-300);
            break;
        case 3:
            camera.position.z -= speed.s3;
            if(camera.position.z < -86000) stage=4;
            camera.lookAt(0,-60,-80000);
            break;
        case 4:
            camera.position.z -= speed.s4;
            camera.lookAt(0,-13,-100000);
            break;
    }
    renderer.render(scene,camera);
}
</script>
</body>
</html>
