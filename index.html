<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Journey To My Universe | 重庆大学宿舍</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    background: #000;
    overflow: hidden;
    font-family: "Microsoft YaHei", Arial, sans-serif;
}
/* 2D启动星空画布 */
#startCanvas{
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
}
#startUI{
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #fff;
    z-index: 3;
    transition: opacity 1.8s ease;
}
#startUI.hide{
    opacity: 0;
    pointer-events: none;
}
#startUI h1{
    font-size: 60px;
    margin-bottom: 18px;
    text-shadow: 0 0 12px #a0d0ff;
}
#startUI p{
    font-size: 24px;
    color: #cccccc;
    margin-bottom: 45px;
}
#enterBtn{
    width: 230px;
    height: 65px;
    border: none;
    border-radius: 50px;
    font-size: 23px;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #ffffff;
    color: #000000;
    font-weight: bold;
}
#enterBtn:hover{
    transform: scale(1.09);
    background: #ddeeff;
    box-shadow: 0 0 20px #77bbff;
}
/* 3D宇宙主场景画布 */
#threeContainer{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    opacity: 0;
    transition: opacity 2s ease;
}
#threeContainer.show{
    opacity: 1;
    z-index: 4;
}
canvas{
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
<!-- 远程加载Three.js 3D引擎，无需本地文件 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<!-- 初始2D星空启动页 -->
<canvas id="startCanvas"></canvas>
<div id="startUI">
    <h1>🌌 Journey To My Universe</h1>
    <p>From Deep Space To Chongqing University Dorm</p>
    <button id="enterBtn">ENTER 开启旅程</button>
</div>
<!-- 3D动画容器 -->
<div id="threeContainer"></div>

<script>
// ===================== 第一部分：2D启动闪烁星空 =====================
const startCanvas = document.getElementById("startCanvas");
const ctx = startCanvas.getContext("2d");
function resizeStartCanvas(){
    startCanvas.width = window.innerWidth;
    startCanvas.height = window.innerHeight;
}
resizeStartCanvas();
window.addEventListener("resize", resizeStartCanvas);

// 生成1000颗启动页星星
const startStars = [];
for(let i = 0; i < 1000; i++){
    startStars.push({
        x: Math.random() * startCanvas.width,
        y: Math.random() * startCanvas.height,
        r: Math.random() * 1.8 + 0.2,
        a: Math.random()
    })
}
function drawStartStarBg(){
    ctx.fillStyle = "#000008";
    ctx.fillRect(0, 0, startCanvas.width, startCanvas.height);
    startStars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${s.a})`;
        ctx.fill();
        // 星星明暗闪烁
        s.a += Math.random() * 0.022 - 0.011;
        s.a = Math.max(0.15, Math.min(1, s.a));
    })
    requestAnimationFrame(drawStartStarBg);
}
drawStartStarBg();

// ===================== 第二部分：点击按钮切换3D宇宙动画 =====================
const enterBtn = document.getElementById("enterBtn");
const startUI = document.getElementById("startUI");
const threeBox = document.getElementById("threeContainer");
enterBtn.addEventListener("click", launchUniverse);

// 全局3D变量
let scene, camera, renderer, controls;
let globalStarList = [];
let galaxyGroup, solarSystem, earth, dormRoom;
let animationStage = 0; // 0深空银河 1太阳系 2聚焦地球 3重庆大学 4宿舍桌面
let clock = new THREE.Clock();

// 启动完整3D场景
function launchUniverse(){
    // 隐藏启动页，显示3D场景
    startUI.classList.add("hide");
    setTimeout(()=>{
        threeBox.classList.add("show");
        initThreeScene();
        animateLoop();
    }, 1200);
}

// 初始化Three.js场景
function initThreeScene(){
    // 基础场景
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200000);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    threeBox.appendChild(renderer.domElement);
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enabled = false; // 全程自动运镜，关闭鼠标拖拽

    // 深空背景+雾效
    scene.background = new THREE.Color("#010010");
    scene.fog = new THREE.Fog("#010010", 300, 150000);
    camera.position.z = 20000;

    // 远景星云
    createNebula("#280050", -1500, 300, -4000, 3000);
    createNebula("#002860", 1800, -500, -6000, 3600);
    createNebula("#581038", -900, -700, -9000, 4500);

    // 全局上万颗深空恒星
    createGlobalStars();

    // 创建螺旋银河
    createGalaxy();

    // 创建太阳系（太阳+八大行星+地球）
    createSolarSystem();

    // 创建宿舍室内场景（桌面+显示器）
    createDormRoom();

    // 窗口自适应
    window.addEventListener("resize", ()=>{
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    })
}

// 创建星云面片工具函数
function createNebula(colorHex, x, y, z, size){
    const geo = new THREE.PlaneGeometry(size, size);
    const mat = new THREE.MeshBasicMaterial({
        color: colorHex, transparent: true, opacity: 0.07, depthWrite: false
    });
    const nebula = new THREE.Mesh(geo, mat);
    nebula.position.set(x, y, z);
    scene.add(nebula);
}

// 生成深空漫天星星
function createGlobalStars(){
    const starGroup = new THREE.Group();
    for(let i = 0; i < 16000; i++){
        const size = Math.random() * 0.7 + 0.1;
        const starGeo = new THREE.SphereGeometry(size, 6, 6);
        const hue = Math.random() * 0.25 + 0.5;
        const starMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(hue, 0.25, 0.75),
            transparent: true, opacity: Math.random()
        });
        const star = new THREE.Mesh(starGeo, starMat);
        star.position.set(
            (Math.random() - 0.5) * 20000,
            (Math.random() - 0.5) * 20000,
            (Math.random() - 0.5) * 20000
        );
        star.userData = {
            baseOpacity: Math.random(),
            flashSpeed: Math.random() * 0.016
        };
        globalStarList.push(star);
        starGroup.add(star);
    }
    scene.add(starGroup);
}

// 螺旋银河模型
function createGalaxy(){
    galaxyGroup = new THREE.Group();
    galaxyGroup.position.z = -30000;
    galaxyGroup.rotation.x = 0.22;
    for(let i = 0; i < 30000; i++){
        const angle = Math.random() * Math.PI * 10;
        const radius = Math.random() * 2600;
        const x = Math.cos(angle) * radius;
        const y = (Math.random() - 0.5) * 220;
        const z = Math.sin(angle) * radius;
        const starSize = Math.random() * 0.85 + 0.1;
        const gGeo = new THREE.SphereGeometry(starSize, 4, 4);
        const gMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(0.12 + Math.random() * 0.32, 0.65, 0.82),
            transparent: true, opacity: Math.random()
        });
        const gStar = new THREE.Mesh(gGeo, gMat);
        gStar.position.set(x, y, z);
        galaxyGroup.add(gStar);
    }
    scene.add(galaxyGroup);
}

// 太阳系：太阳+八大行星+独立地球
function createSolarSystem(){
    solarSystem = new THREE.Group();
    solarSystem.position.z = -55000;
    scene.add(solarSystem);
    // 太阳光
    const sunGeo = new THREE.SphereGeometry(65, 16, 16);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd77 });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    const sunLight = new THREE.PointLight(0xfffacc, 2.4, 1400);
    sun.add(sunLight);
    solarSystem.add(sun);

    // 八大行星参数
    const planetConfigs = [
        {size:2.2, dist:130, color:0x8a7252, speed:0.0082},
        {size:3.1, dist:190, color:0xffd799, speed:0.0061},
        {size:4.4, dist:270, color:0x6a92d5, speed:0.0042},
        {size:2.6, dist:350, color:0xdd6a4a, speed:0.0031},
        {size:19, dist:540, color:0xc78a39, speed:0.0011},
        {size:15, dist:720, color:0xffdf98, speed:0.00082},
        {size:8.3, dist:930, color:0x9ed7e7, speed:0.00051},
        {size:7.8, dist:1130, color:0x496bf2, speed:0.00032}
    ];
    const planets = [];
    planetConfigs.forEach(p => {
        const pGeo = new THREE.SphereGeometry(p.size, 12, 12);
        const pMat = new THREE.MeshLambertMaterial({ color: p.color });
        const planet = new THREE.Mesh(pGeo, pMat);
        planet.userData = { dist: p.dist, speed: p.speed, angle: 0 };
        solarSystem.add(planet);
        planets.push(planet);
    })
    // 单独取出地球（第三颗行星）
    earth = planets[2];
}

// 宿舍房间场景：桌面+显示器（抖音画面载体）
function createDormRoom(){
    dormRoom = new THREE.Group();
    dormRoom.position.z = -95000;
    dormRoom.position.y = -80;
    scene.add(dormRoom);
    // 桌面主体
    const deskGeo = new THREE.BoxGeometry(65, 4, 32);
    const deskMat = new THREE.MeshLambertMaterial({ color: 0x5a3a22 });
    const desk = new THREE.Mesh(deskGeo, deskMat);
    desk.position.y = -16;
    dormRoom.add(desk);
    // 显示器
    const screenFrameGeo = new THREE.BoxGeometry(24, 14, 1.2);
    const frameMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const screenFrame = new THREE.Mesh(screenFrameGeo, frameMat);
    screenFrame.position.set(0, 3, -18);
    dormRoom.add(screenFrame);
    // 抖音屏幕平面（可替换图片，使用在线贴图演示）
    const screenTexLoader = new THREE.TextureLoader();
    const screenGeo = new THREE.PlaneGeometry(22, 12);
    const screenMat = new THREE.MeshBasicMaterial({
        map: screenTexLoader.load("https://picsum.photos/id/1039/1080/600")
    });
    const screen = new THREE.Mesh(screenGeo, screenMat);
    screen.position.set(0, 3, -17.3);
    dormRoom.add(screen);
    // 环境补光
    const roomLight = new THREE.PointLight(0xfff8e0, 1.2, 200);
    roomLight.position.set(0, 10, -10);
    dormRoom.add(roomLight);
}

// 主动画循环（全程自动分段运镜）
function animateLoop(){
    requestAnimationFrame(animateLoop);
    const delta = clock.getDelta();
    // 全局星星闪烁
    globalStarList.forEach(star => {
        star.material.opacity = star.userData.baseOpacity + Math.sin(Date.now() * star.userData.flashSpeed) * 0.36;
    })
    // 银河缓慢自转
    galaxyGroup.rotation.z += 0.00032;
    // 行星轨道公转
    solarSystem.children.forEach(obj => {
        if(obj.userData?.dist){
            obj.userData.angle += obj.userData.speed;
            obj.position.x = Math.cos(obj.userData.angle) * obj.userData.dist;
            obj.position.z = Math.sin(obj.userData.angle) * obj.userData.dist;
        }
    })
    // 地球自转
    earth.rotation.y += 0.0012;

    // ========== 分段自动运镜逻辑 ==========
    const cameraSpeed = {
        stage0: 2.6,  // 阶段0：飞向银河
        stage1: 1.1,  // 阶段1：飞向太阳系
        stage2: 0.45, // 阶段2：聚焦地球
        stage3: 0.18, // 阶段3：飞向重庆大学
        stage4: 0.06  // 阶段4：宿舍桌面特写
    }
    switch(animationStage){
        case 0:
            camera.position.z -= cameraSpeed.stage0;
            // 到达银河切换阶段1
            if(camera.position.z < -25000) animationStage = 1;
            break;
        case 1:
            camera.position.z -= cameraSpeed.stage1;
            // 抵达太阳系切换阶段2
            if(camera.position.z < -52000) animationStage = 2;
            break;
        case 2:
            camera.position.z -= cameraSpeed.stage2;
            // 镜头靠近地球，切换到重庆大学校园阶段
            if(camera.position.z < -68000) animationStage = 3;
            // 相机轻微对准地球
            camera.lookAt(earth.position.x, earth.position.y, earth.position.z - 300);
            break;
        case 3:
            camera.position.z -= cameraSpeed.stage3;
            // 抵达地球表面，切换宿舍室内阶段
            if(camera.position.z < -82000) animationStage = 4;
            camera.lookAt(0, -40, -75000);
            break;
        case 4:
            camera.position.z -= cameraSpeed.stage4;
            // 镜头锁定宿舍显示器
            camera.lookAt(0, -13, -95000);
            break;
    }
    renderer.render(scene, camera);
}
</script>
</body>
</html>
