<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universe Journey</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:black;

overflow:hidden;

font-family:Arial;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

/* 星空 */

#stars{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:
radial-gradient(white 1px, transparent 1px);

background-size:40px 40px;

animation:moveStars 30s linear infinite;

opacity:0.8;

}

@keyframes moveStars{

0%{

transform:translateY(0);

}

100%{

transform:translateY(40px);

}

}

.content{

position:relative;

z-index:10;

text-align:center;

}

h1{

font-size:60px;

letter-spacing:4px;

margin-bottom:30px;

}

button{

padding:18px 50px;

font-size:24px;

background:white;

border:none;

border-radius:50px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.1);

}

</style>

</head>

<body>

<div id="stars"></div>

<div class="content">

<h1>🌌 Welcome To My Universe 🌌</h1>

<button onclick="startJourney()">

ENTER

</button>

</div>

<script>

function startJourney(){

alert("下一课开始飞向宇宙！");

}

</script>

</body>

</html>
