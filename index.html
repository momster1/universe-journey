<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙穿梭｜重大宿舍</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000}
canvas{display:block;width:100vw;height:100vh;}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z = 1000;

// ========== 第4课核心：深空宇宙背景 ==========
// 1. 场景渐变背景色（深空深蓝黑）
scene.background = new THREE.Color("#020014");
scene.fog = new THREE.Fog("#020014", 200, 1000);

// 2. 远景星云面片
function createNebula(color, posX, posY, posZ, size){
  const geo = new THREE.PlaneGeometry(size, size);
  const mat = new THREE.MeshBasicMaterial({
    color: color, transparent:true, opacity:0.08, depthWrite:false
  })
  const nebula = new THREE.Mesh(geo, mat);
  nebula.position.set(posX, posY, posZ);
  scene.add(nebula);
}
// 多层星云分布
createNebula("#300060", -1200, 200, -3000, 2500);
createNebula("#002060", 1500, -400, -5000, 3000);
createNebula("#601040", -800, -600, -8000, 4000);

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
})

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
