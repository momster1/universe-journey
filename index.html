<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journey To My Universe</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* 星空背景 */
#stars{
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
    background-size:
        80px 80px,
        120px 120px,
        200px 200px;
    animation:move 80s linear infinite;
}

/* 页面内容 */
#main{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:10;
}

h1{
    font-size:60px;
    margin-bottom:15px;
}

p{
    font-size:24px;
    color:#cccccc;
    margin-bottom:40px;
}

button{
    width:220px;
    height:60px;
    border:none;
    border-radius:40px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

@keyframes move{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(120px);
    }

}

</style>

</head>

<body>

<div id="stars"></div>

<div id="main">

<h1>🌌 Journey To My Universe</h1>

<p>从宇宙到重庆大学</p>

<button onclick="start()">ENTER</button>

</div>

<script>

function start(){

    alert("下一课开始制作真正的宇宙动画！");

}

</script>

</body>

</html>
